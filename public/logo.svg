<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Icon mark: four colored squares with circle cutout -->
  <g transform="translate(5, 5)">
    <!-- Red square (top-left) -->
    <rect x="0" y="0" width="38" height="38" rx="2" fill="#CC1E2D"/>
    <!-- Yellow square (top-right) -->
    <rect x="42" y="0" width="38" height="38" rx="2" fill="#F5C518"/>
    <!-- Blue square (bottom-left) -->
    <rect x="0" y="42" width="38" height="38" rx="2" fill="#3DB4E7"/>
    <!-- Green square (bottom-right) -->
    <rect x="42" y="42" width="38" height="38" rx="2" fill="#8DC63F"/>
    <!-- White circle cutout -->
    <circle cx="40" cy="40" r="22" fill="white"/>
  </g>
  <!-- C&D text -->
  <text x="105" y="62" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="62" fill="#1a1a1a">C&amp;D</text>
  <!-- PRINTING AND PACKAGING subtitle -->
  <text x="107" y="85" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" letter-spacing="2" fill="#1a1a1a">PRINTING AND PACKAGING</text>
</svg>
